  <!-- Continentes estilizados -->
  <ellipse cx="26" cy="26" rx="8" ry="6" fill="#00c9a7" opacity="0.95"/>
  <ellipse cx="38" cy="30" rx="6" ry="8" fill="#00c9a7" opacity="0.95"/>
  <ellipse cx="28" cy="38" rx="5" ry="4" fill="#00c9a7" opacity="0.95"/>
  <!-- Líneas de latitud -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="14" y1="22" x2="50" y2="22" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="14" y1="42" x2="50" y2="42" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <!-- Línea vertical central -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="white" stroke-width="0.8" opacity="0.3"/>
